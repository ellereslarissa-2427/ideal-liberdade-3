<script>
  (function() {
    'use strict';

    // ============================================
    // RECUPERA DADOS UTM
    // ============================================
    let utmData = {};
    try {
      const stored = localStorage.getItem('utm_data');
      utmData = stored ? JSON.parse(stored) : {};
    } catch(e) {
      utmData = {};
    }

    // ============================================
    // PREENCHE CAMPOS OCULTOS
    // ============================================
    const utmFields = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
    utmFields.forEach(function(field) {
      const el = document.getElementById(field);
      if (el) el.value = utmData[field] || 'organico';
    });

    // ============================================
    // FUNÇÃO PARA RASTREAR CLIQUE NO WHATSAPP
    // ============================================
    window.trackWhatsApp = function() {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Contact', {
          content_name: 'WhatsApp Float - Ideal + Liberdade 3',
          content_category: 'Contato Direto',
          ...utmData
        });
      }
    };

    // ============================================
    // MÁSCARA PARA CPF
    // ============================================
    const cpfInput = document.getElementById('cpf');
    if (cpfInput) {
      cpfInput.addEventListener('input', function(e) {
        let value = this.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        
        if (value.length <= 3) {
          this.value = value;
        } else if (value.length <= 6) {
          this.value = value.slice(0,3) + '.' + value.slice(3);
        } else if (value.length <= 9) {
          this.value = value.slice(0,3) + '.' + value.slice(3,6) + '.' + value.slice(6);
        } else {
          this.value = value.slice(0,3) + '.' + value.slice(3,6) + '.' + value.slice(6,9) + '-' + value.slice(9);
        }
      });
    }

    // ============================================
    // MÁSCARA PARA TELEFONE
    // ============================================
    const telefoneInput = document.getElementById('telefone');
    if (telefoneInput) {
      telefoneInput.addEventListener('input', function(e) {
        let value = this.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        
        if (value.length <= 2) {
          this.value = '(' + value;
        } else if (value.length <= 6) {
          this.value = '(' + value.slice(0,2) + ') ' + value.slice(2);
        } else if (value.length <= 10) {
          this.value = '(' + value.slice(0,2) + ') ' + value.slice(2,6) + '-' + value.slice(6);
        } else {
          this.value = '(' + value.slice(0,2) + ') ' + value.slice(2,7) + '-' + value.slice(7);
        }
      });
    }

    // ============================================
    // FUNÇÃO DE QUALIFICAÇÃO DE LEAD
    // ============================================
    function qualificarLead(dados) {
      let pontuacao = 0;
      const motivos = [];

      const renda = dados.get('Faixa de renda');
      if (renda === 'Até R$ 1.800' || renda === 'R$ 1.800 a R$ 4.400') {
        pontuacao += 30;
        motivos.push('Renda compatível com MCMV');
      } else if (renda === 'R$ 4.400 a R$ 8.000') {
        pontuacao += 20;
        motivos.push('Renda acima do MCMV');
      } else {
        pontuacao += 10;
        motivos.push('Renda alta - Perfil investidor');
      }

      const vinculo = dados.get('Vínculo de trabalho');
      if (['CLT (carteira assinada)', 'Servidor público'].includes(vinculo)) {
        pontuacao += 25;
        motivos.push('Vínculo formal');
      } else if (vinculo === 'MEI' || vinculo === 'Autônomo com comprovante') {
        pontuacao += 15;
        motivos.push('Autônomo/MEI');
      } else {
        pontuacao += 5;
        motivos.push('Sem renda formal');
      }

      const objetivo = dados.get('Objetivo');
      if (['Sair do aluguel', 'Comprar meu primeiro imóvel'].includes(objetivo)) {
        pontuacao += 25;
        motivos.push('Compra imediata');
      } else if (objetivo === 'Investir em imóvel') {
        pontuacao += 20;
        motivos.push('Perfil investidor');
      } else {
        pontuacao += 5;
        motivos.push('Objetivo indefinido');
      }

      const prazo = dados.get('Prazo');
      if (prazo === 'Assim que possível' || prazo === 'Nos próximos 3 meses') {
        pontuacao += 20;
        motivos.push('Curto prazo');
      } else if (prazo === 'Em 6 meses') {
        pontuacao += 10;
        motivos.push('Médio prazo');
      } else {
        pontuacao += 5;
        motivos.push('Longo prazo');
      }

      let classificacao = 'Baixa';
      if (pontuacao >= 80) classificacao = 'Muito Alta';
      else if (pontuacao >= 60) classificacao = 'Alta';
      else if (pontuacao >= 40) classificacao = 'Média';
      else classificacao = 'Baixa';

      return {
        pontuacao: pontuacao,
        classificacao: classificacao,
        motivos: motivos.join(' | '),
        renda: renda,
        vinculo: vinculo,
        objetivo: objetivo,
        prazo: prazo
      };
    }

    // ============================================
    // VALIDAÇÃO DO FORMULÁRIO
    // ============================================
    function validarFormulario(form) {
      let valido = true;
      const campos = form.querySelectorAll('[required]');
      
      campos.forEach(function(campo) {
        const errorClass = 'error';
        if (!campo.value || campo.value.trim() === '') {
          campo.classList.add(errorClass);
          valido = false;
        } else {
          campo.classList.remove(errorClass);
        }
        
        if (campo.type === 'checkbox' && !campo.checked) {
          campo.classList.add(errorClass);
          valido = false;
        } else if (campo.type === 'checkbox') {
          campo.classList.remove(errorClass);
        }
      });

      return valido;
    }

    // ============================================
    // EVENTO DE SUBMISSÃO DO FORMULÁRIO
    // ============================================
    const form = document.getElementById('formLead');
    const btnSubmit = document.getElementById('btnSubmit');

    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (!validarFormulario(form)) {
          const primeiroErro = form.querySelector('.error');
          if (primeiroErro) {
            primeiroErro.focus();
            primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
          return;
        }

        if (btnSubmit) {
          btnSubmit.disabled = true;
          btnSubmit.innerHTML = 'Enviando...';
        }

        const dados = new FormData(form);

        utmFields.forEach(function(field) {
          const el = document.getElementById(field);
          if (el) el.value = utmData[field] || 'organico';
        });

        const qualificacao = qualificarLead(dados);

        // ============================================
        // DISPARA O EVENTO LEAD NO META PIXEL
        // VALUE NUMÉRICO CONFORME ORIENTAÇÃO
        // ============================================
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Lead', {
            value: 10.00,  // ✅ VALOR NUMÉRICO FIXO (conforme orientação)
            currency: 'BRL',  // ✅ MOEDA CORRETA
            content_name: 'Ideal + Liberdade 3',
            content_category: 'Formulário Enviado',
            content_type: 'product',
            empreendimento: 'Ideal + Liberdade 3 - Ananindeua/PA',
            
            // PARÂMETROS PERSONALIZADOS PARA SEGMENTAÇÃO
            // (NÃO AFETAM O VALUE PRINCIPAL)
            lead_score: qualificacao.pontuacao,
            lead_classificacao: qualificacao.classificacao,
            lead_motivos: qualificacao.motivos,
            faixa_renda: qualificacao.renda,
            vinculo_trabalho: qualificacao.vinculo,
            objetivo_lead: qualificacao.objetivo,
            prazo_compra: qualificacao.prazo,
            ...utmData
          });
        }

        // ============================================
        // MONTA MENSAGEM PARA WHATSAPP
        // ============================================
        const nome = dados.get('Nome') || '';
        const cpf = dados.get('CPF') || '';
        const telefone = dados.get('WhatsApp') || '';
        const email = dados.get('E-mail') || '';

        const msg = '🏠 *NOVO LEAD - Ideal + Liberdade 3*\n\n' +
                    '👤 *Nome:* ' + nome + '\n' +
                    '📋 *CPF:* ' + cpf + '\n' +
                    '📱 *WhatsApp:* ' + telefone + '\n' +
                    '📧 *E-mail:* ' + email + '\n\n' +
                    '📊 *QUALIFICAÇÃO DO LEAD:*\n' +
                    '🎯 Pontuação: ' + qualificacao.pontuacao + '/100\n' +
                    '⭐ Classificação: ' + qualificacao.classificacao + '\n' +
                    '📝 Motivos: ' + qualificacao.motivos + '\n\n' +
                    '💰 *Renda:* ' + qualificacao.renda + '\n' +
                    '💼 *Vínculo:* ' + qualificacao.vinculo + '\n' +
                    '🎯 *Objetivo:* ' + qualificacao.objetivo + '\n' +
                    '⏰ *Prazo:* ' + qualificacao.prazo + '\n\n' +
                    '📊 *ORIGEM DO LEAD:*\n' +
                    'Fonte: ' + (utmData.utm_source || 'organico') + '\n' +
                    'Meio: ' + (utmData.utm_medium || 'organico') + '\n' +
                    'Campanha: ' + (utmData.utm_campaign || 'organico') + '\n\n' +
                    '🏢 *Empreendimento:* Ideal + Liberdade 3 - Ananindeua/PA';

        // ============================================
        // ENVIA PARA FORMSPREE
        // ============================================
        fetch(form.action, {
          method: 'POST',
          body: dados,
          headers: { 'Accept': 'application/json' }
        }).catch(function(err) {
          console.log('Erro ao enviar para Formspree:', err);
        });

        // ============================================
        // REDIRECIONA PARA WHATSAPP
        // ============================================
        const link = 'https://wa.me/5591981558577?text=' + encodeURIComponent(msg);
        window.location.href = link;
      });

      form.querySelectorAll('input, select').forEach(function(el) {
        el.addEventListener('input', function() {
          this.classList.remove('error');
        });
        el.addEventListener('change', function() {
          this.classList.remove('error');
        });
      });
    }

  })();
</script>
